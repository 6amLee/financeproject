name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway redeploy
        run: |
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { deploymentRedeploy(id: \\\"$RAILWAY_DEPLOYMENT_ID\\\") { id status } }\"}" \
            | tee /dev/stderr | grep -q '"id"'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_DEPLOYMENT_ID: ${{ secrets.RAILWAY_DEPLOYMENT_ID }}
